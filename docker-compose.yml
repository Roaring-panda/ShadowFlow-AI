version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=True
      - DATABASE_URL=postgresql://shadowflow:password@db:5432/shadowflow_ai
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=shadowflow
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shadowflow_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
